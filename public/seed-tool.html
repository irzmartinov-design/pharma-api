function getBase() {
  const v = document.getElementById('apiBase').value.trim();
  return v || window.location.origin;
}
function getKey() { return document.getElementById('anahtar').value.trim(); }

let logEl = document.getElementById('log');
function log(msg, cls='inf') {
  logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

async function apiPost(path, body) {
  const res = await fetch(getBase() + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ─── Reset ───────────────────────────────────────────────────────────────────
async function resetDb() {
  clearLog();
  log('Veritabanı sıfırlanıyor...', 'warn');
  try {
    const r = await apiPost('/api/resetDb', { gizliAnahtar: getKey() });
    if (r.basarili) log('✅ ' + r.mesaj, 'ok');
    else log('❌ ' + r.hata, 'err');
  } catch(e) { log('❌ ' + e.message, 'err'); }
}

// ─── Seed ────────────────────────────────────────────────────────────────────
const BATCH = 50;

async function seedAll() {
  clearLog();
  log(`Toplam ${URUNLER.length} ürün yüklenecek — ${Math.ceil(URUNLER.length/BATCH)} batch...`, 'inf');

  // 1) Markalar + Kategoriler (tek seferde)
  log('Markalar ve kategoriler ekleniyor...', 'inf');
  const r0 = await apiPost('/api/seedBulk', { markalar: MARKALAR, kategoriler: KATEGORILER, urunler: [] });
  if (!r0.basarili) { log('❌ Marka/Kategori hatası: ' + r0.hata, 'err'); return; }
  log(`✅ ${MARKALAR.length} marka, ${KATEGORILER.length} kategori eklendi`, 'ok');

  // 2) Ürünler (batch)
  for (let i = 0; i < URUNLER.length; i += BATCH) {
    const batch = URUNLER.slice(i, i + BATCH);
    const from = i + 1, to = Math.min(i + BATCH, URUNLER.length);
    log(`Ürünler ${from}–${to} yükleniyor...`, 'inf');
    const r = await apiPost('/api/seedBulk', { urunler: batch });
    if (!r.basarili) { log(`❌ Batch hatası (${from}-${to}): ` + r.hata, 'err'); return; }
    log(`✅ Ürün ${from}–${to} yüklendi`, 'ok');
  }

  log('', '');
  log(`🎉 Tamamlandı! ${URUNLER.length} ürün yüklendi.`, 'ok');
  log('⚠️  Iron Pharma ve Swiss Pharma ürünleri ayrıca eklenecek.', 'warn');
}

async function resetAndSeed() {
  clearLog();
  log('Sıfırlama başlıyor...', 'warn');
  try {
    const r = await apiPost('/api/resetDb', { gizliAnahtar: getKey() });
    if (!r.basarili) { log('❌ Reset hatası: ' + r.hata, 'err'); return; }
    log('✅ Veritabanı sıfırlandı', 'ok');
  } catch(e) { log('❌ ' + e.message, 'err'); return; }
  await seedAll();
}
