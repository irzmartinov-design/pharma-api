<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sipariş Ver</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:#1a1a2e;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.header h2{font-size:16px;font-weight:600}
.header a{color:#aab;font-size:13px;text-decoration:none}
.header a:hover{color:#fff}
.container{max-width:760px;margin:24px auto;padding:0 16px}
.kart{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:16px}
.kart h3{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:16px;border-bottom:2px solid #f0f2f5;padding-bottom:8px}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:#5f6368;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
select,input{width:100%;padding:10px 12px;border:1px solid #dadce0;border-radius:8px;font-size:14px;color:#1a1a2e;background:#fff}
select:focus,input:focus{outline:none;border-color:#1a73e8}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fiyat-kutu{background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.fiyat-kutu .etiket{font-size:12px;color:#5f6368}
.fiyat-kutu .deger{font-size:20px;font-weight:700;color:#1a1a2e}
.fiyat-kutu .para{font-size:13px;color:#5f6368;margin-left:4px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-primary:disabled{background:#b0c4de;cursor:not-allowed}
.btn-success{background:#188038;color:#fff}
.btn-success:hover{background:#0d6e2e}
.btn-outline{background:#fff;color:#5f6368;border:1px solid #dadce0}
.btn-w100{width:100%}
.mesaj{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.mesaj.basarili{background:#e6f4ea;color:#188038}
.mesaj.hata{background:#fce8e6;color:#d93025}
.yukleniyor{color:#5f6368;font-size:13px;padding:20px;text-align:center}
.urun-bilgi{background:#e8f0fe;border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px;color:#1a73e8;display:none}
/* Sepet */
.sepet-bos{color:#5f6368;font-size:13px;padding:12px 0;text-align:center}
.sepet-tablo{width:100%;border-collapse:collapse;font-size:13px}
.sepet-tablo th{background:#f8f9fa;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:#5f6368;border-bottom:1px solid #dadce0}
.sepet-tablo td{padding:8px 10px;border-bottom:1px solid #f0f2f5;vertical-align:top}
.sepet-tablo .sil-btn{background:none;border:none;color:#d93025;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.sepet-ozet{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:2px solid #f0f2f5;margin-top:8px}
.sepet-ozet .toplam-txt{font-weight:700;font-size:15px;color:#1a1a2e}
.bayi-secim{background:#fff8e1;border:1px solid #f9ab00;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#5f6368}
.bayi-secim label{color:#5f6368;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.adres-ekle-btn{margin-top:8px;font-size:12px;color:#1a73e8;background:none;border:none;cursor:pointer;padding:0;font-weight:600}
.adres-ekle-btn:hover{text-decoration:underline}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center}
.modal-overlay.acik{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h3{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:18px}
.modal .form-group{margin-bottom:12px}
.modal-footer{display:flex;gap:8px;margin-top:18px}
</style>
</head>
<body>

<div class="header">
  <h2 data-t="baslik_h2">🛒 Yeni Sipariş</h2>
  <a href="dashboard.html" data-t="link_dashboard">← Dashboard</a>
</div>

<div class="container">

<!-- Müşteri Kartı (Bayi/Admin) -->
<div class="kart" id="musteriKart" style="display:none">
  <h3 data-t="musteri_basligi">👤 Müşteri</h3>
  <div class="bayi-secim" id="bayiKendiSecim" style="display:none">
    <label data-t="lbl_kendi_adina">Kendi adınıza sipariş</label>
    <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
      <input type="checkbox" id="chkKendiSiparis" onchange="kendiSiparisToggle()" style="width:auto">
      <span data-t="lbl_musteri_secmeden">Müşteri seçmeden kendinize sipariş verin</span>
    </div>
  </div>
  <div class="form-group" id="musteriSecGrup">
    <label data-t="lbl_musteri_zorunlu">Müşteri *</label>
    <select id="selMusteri" onchange="musteriDegisti()">
      <option value="" data-t="opt_musteri_secin">Müşteri seçin</option>
    </select>
  </div>
</div>

<!-- Ürün Seçimi -->
<div class="kart">
  <h3 data-t="urun_secimi_basligi">📦 Ürün Seçimi</h3>
  <div id="yukleniyor" class="yukleniyor" data-t="lbl_urunler_yukleniyor">⏳ Ürünler yükleniyor...</div>
  <div id="formIcerik" style="display:none">
    <div class="form-row">
      <div class="form-group">
        <label data-t="lbl_marka">Marka</label>
        <select id="selMarka" onchange="markaFiltre()">
          <option value="" data-t="opt_tumu">Tümü</option>
        </select>
      </div>
      <div class="form-group">
        <label data-t="lbl_kategori">Kategori</label>
        <select id="selKat" onchange="katFiltre()">
          <option value="" data-t="opt_tumu">Tümü</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label data-t="lbl_urun_zorunlu">Ürün *</label>
      <select id="selUrun" onchange="urunSec()">
        <option value="" data-t="opt_urun_secin">Ürün seçin</option>
      </select>
    </div>
    <div id="urunBilgi" class="urun-bilgi"></div>
    <div class="form-row">
      <div class="form-group">
        <label data-t="lbl_miktar_zorunlu">Miktar *</label>
        <input type="number" id="miktar" min="1" step="1" placeholder="0" oninput="toplamHesapla()">
      </div>
      <div class="form-group">
        <label data-t="lbl_para_birimi">Para Birimi</label>
        <input type="text" id="para" readonly style="background:#f8f9fa;color:#5f6368">
      </div>
    </div>
    <div class="fiyat-kutu">
      <div>
        <div class="etiket" data-t="lbl_birim_fiyat">Birim Fiyat</div>
        <div><span class="deger" id="birimFiyat">—</span></div>
      </div>
      <div style="text-align:right">
        <div class="etiket" data-t="lbl_toplam_tutar">Toplam Tutar</div>
        <div><span class="deger" id="toplamTutar">—</span> <span class="para" id="paraBirim"></span></div>
      </div>
    </div>
    <button class="btn btn-success" id="btnSepeteEkle" onclick="sepeteEkle()" disabled data-t="btn_sepete_ekle">+ Sepete Ekle</button>
  </div>
</div>

<!-- Sepet -->
<div class="kart">
  <h3 data-t="sepet_basligi">🛒 Sepet</h3>
  <div id="sepetIcerik"><p class="sepet-bos" data-t="sepet_bos">Henüz ürün eklenmedi.</p></div>
</div>

<!-- Adres -->
<div class="kart">
  <h3 data-t="teslimat_basligi">📍 Teslimat Adresi</h3>
  <div class="form-group">
    <select id="selAdres">
      <option value="" data-t="opt_adres_secin_zorunlu">— Adres seçin (zorunlu) —</option>
    </select>
  </div>
  <button class="adres-ekle-btn" onclick="adresEkleAc()" data-t="btn_yeni_adres_ekle">+ Yeni Adres Ekle</button>
</div>

<!-- Adres Ekleme Modalı -->
<div class="modal-overlay" id="adresModal">
  <div class="modal">
    <h3 data-t="modal_yeni_adres">📍 Yeni Adres Ekle</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label data-t="lbl_adres_adi_zorunlu">Adres Adı *</label>
        <input type="text" id="yeniAdresAd" placeholder="Ev, İş, Depo..." data-tph="ph_adres_adi">
      </div>
      <div class="form-group">
        <label data-t="lbl_alici_adi">Alıcı Adı Soyadı</label>
        <input type="text" id="yeniAdresAlici" placeholder="Ad Soyad" data-tph="ph_alici_adi">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label data-t="lbl_telefon">Telefon</label>
        <input type="text" id="yeniAdresTel" placeholder="5xx xxx xxxx" data-tph="ph_telefon">
      </div>
      <div class="form-group">
        <label data-t="lbl_il_ulke">İl / Ülke</label>
        <input type="text" id="yeniAdresSehir" placeholder="İstanbul / Türkiye" data-tph="ph_il_ulke">
      </div>
    </div>
    <div class="form-group">
      <label data-t="lbl_ilce">İlçe</label>
      <input type="text" id="yeniAdresIlce" placeholder="Kadıköy" data-tph="ph_ilce">
    </div>
    <div class="form-group">
      <label data-t="lbl_adres_zorunlu">Adres *</label>
      <textarea id="yeniAdresSatir" rows="2" style="width:100%;padding:10px 12px;border:1px solid #dadce0;border-radius:8px;font-size:14px;resize:none" placeholder="Sokak, mahalle, bina no..." data-tph="ph_adres_satir"></textarea>
    </div>
    <div class="mesaj" id="adresMesaj"></div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-w100" id="btnAdresKaydet" onclick="adresEkleKaydet()" data-t="kaydet">💾 Kaydet</button>
      <button class="btn btn-outline" onclick="adresEkleKapat()" data-t="iptal">İptal</button>
    </div>
  </div>
</div>

<!-- Gönder -->
<div class="kart">
  <div class="form-group">
    <label data-t="lbl_sip_notu">Sipariş Notu</label>
    <input type="text" id="sipNot" placeholder="Özel istek veya not (opsiyonel)" data-tph="ph_sip_notu">
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary btn-w100" id="btnGonder" onclick="siparisGonder()" disabled data-t="btn_sip_gonder">🛒 Siparişi Gönder</button>
    <button class="btn btn-outline" onclick="window.location.href='dashboard.html'" data-t="btn_geri">← Geri</button>
  </div>
  <div class="mesaj" id="mesaj"></div>
</div>

</div>

<script>
var API = '/api';
var oturum = null;
var tumUrunler = [];
var birimFiyatDeger = 0;
var secilenParaStr = '';
var sepet = []; // {urun, miktar, birimFiyat, para, toplam}

function fmtTutar(x) {
  var n = parseFloat(x) || 0;
  var parcalar = n.toFixed(2).split('.');
  parcalar[0] = parcalar[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return parcalar.join('.');
}

// ── ÇEVİRİ SİSTEMİ ─────────────────────────────────────────────────────
var DIL = 'tr';
var T = {
  tr: {
    baslik_sayfa:'Sipariş Ver', baslik_h2:'🛒 Yeni Sipariş', link_dashboard:'← Dashboard',
    musteri_basligi:'👤 Müşteri', lbl_kendi_adina:'Kendi adınıza sipariş', lbl_musteri_secmeden:'Müşteri seçmeden kendinize sipariş verin',

    lbl_marka:'Marka', opt_tumu:'Tümü', lbl_kategori:'Kategori', lbl_urun_zorunlu:'Ürün *', opt_urun_secin:'Ürün seçin',
    lbl_miktar_zorunlu:'Miktar *', lbl_para_birimi:'Para Birimi', lbl_birim_fiyat:'Birim Fiyat', lbl_toplam_tutar:'Toplam Tutar',
    btn_sepete_ekle:'+ Sepete Ekle', sepet_basligi:'🛒 Sepet', sepet_bos:'Henüz ürün eklenmedi.',
    teslimat_basligi:'📍 Teslimat Adresi', opt_adres_secin_zorunlu:'— Adres seçin (zorunlu) —', btn_yeni_adres_ekle:'+ Yeni Adres Ekle',
    modal_yeni_adres:'📍 Yeni Adres Ekle', lbl_adres_adi_zorunlu:'Adres Adı *', ph_adres_adi:'Ev, İş, Depo...',
    lbl_alici_adi:'Alıcı Adı Soyadı', ph_alici_adi:'Ad Soyad', lbl_telefon:'Telefon', ph_telefon:'5xx xxx xxxx',
    lbl_il_ulke:'İl / Ülke', ph_il_ulke:'İstanbul / Türkiye', lbl_ilce:'İlçe', ph_ilce:'Kadıköy',
    lbl_adres_zorunlu:'Adres *', ph_adres_satir:'Sokak, mahalle, bina no...', kaydet:'💾 Kaydet', iptal:'İptal',
    lbl_sip_notu:'Sipariş Notu', ph_sip_notu:'Özel istek veya not (opsiyonel)', btn_sip_gonder:'🛒 Siparişi Gönder', btn_geri:'← Geri',
    th_urun:'Ürün', th_adet:'Adet', th_birim_fiyat:'Birim Fiyat', th_tutar:'Tutar', lbl_urun_cesidi:' ürün çeşidi', lbl_toplam_yaklasik:'Toplam ≈ ',
    msg_kayitli_urun_yok:'Kayıtlı ürün bulunamadı.', msg_urunler_yuklenemedi:'❌ Ürünler yüklenemedi.',
    msg_kayitli_adres_yok:'Kayıtlı adres yok', msg_adres_yuklenemedi:'Adres yüklenemedi',
    msg_sepete_urun_ekle:'Sepete ürün ekleyin', msg_teslimat_secin:'Teslimat adresi seçin', msg_musteri_secin:'Müşteri seçin',
    btn_gonderiliyor:'⏳ Gönderiliyor...', msg_sip_alindi:'✅ Sipariş alındı! No: ', msg_hata_olustu:'Hata oluştu', msg_baglanti_hatasi:'Bağlantı hatası',
    msg_once_musteri_secin:'Önce müşteri seçin', msg_adres_adi_zorunlu:'Adres adı ve adres zorunlu', btn_kaydediliyor:'⏳ Kaydediliyor...',
    msg_kayit_hatasi:'Kayıt hatası', yukleniyor:'⏳ Yükleniyor...',
  },
  en: {
    baslik_sayfa:'Place Order', baslik_h2:'🛒 New Order', link_dashboard:'← Dashboard',
    musteri_basligi:'👤 Customer', lbl_kendi_adina:'Order for yourself', lbl_musteri_secmeden:'Place an order for yourself without selecting a customer',
    lbl_musteri_zorunlu:'Customer *', opt_musteri_secin:'Select customer',
    urun_secimi_basligi:'📦 Product Selection', lbl_urunler_yukleniyor:'⏳ Loading products...',
    lbl_marka:'Brand', opt_tumu:'All', lbl_kategori:'Category', lbl_urun_zorunlu:'Product *', opt_urun_secin:'Select product',
    lbl_miktar_zorunlu:'Quantity *', lbl_para_birimi:'Currency', lbl_birim_fiyat:'Unit Price', lbl_toplam_tutar:'Total Amount',
    btn_sepete_ekle:'+ Add to Cart', sepet_basligi:'🛒 Cart', sepet_bos:'No products added yet.',
    teslimat_basligi:'📍 Delivery Address', opt_adres_secin_zorunlu:'— Select address (required) —', btn_yeni_adres_ekle:'+ Add New Address',
    modal_yeni_adres:'📍 Add New Address', lbl_adres_adi_zorunlu:'Address Name *', ph_adres_adi:'Home, Work, Warehouse...',
    lbl_alici_adi:'Recipient Name', ph_alici_adi:'Full Name', lbl_telefon:'Phone', ph_telefon:'Phone number',

    lbl_adres_zorunlu:'Address *', ph_adres_satir:'Street, neighborhood, building no...', kaydet:'💾 Save', iptal:'Cancel',

    msg_kayitli_urun_yok:'No products found.', msg_urunler_yuklenemedi:'❌ Failed to load products.',
    msg_kayitli_adres_yok:'No saved addresses', msg_adres_yuklenemedi:'Failed to load addresses',
    msg_sepete_urun_ekle:'Add a product to the cart', msg_teslimat_secin:'Select a delivery address', msg_musteri_secin:'Select a customer',

    msg_once_musteri_secin:'Select a customer first', msg_adres_adi_zorunlu:'Address name and address are required', btn_kaydediliyor:'⏳ Saving...',

  }
};
function t(key) { return (T[DIL] && T[DIL][key]) || (T.tr[key]) || key; }
function uygulaCeviri() {
  document.title = t('baslik_sayfa');
  document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent = t(el.getAttribute('data-t')); });
  document.querySelectorAll('[data-tph]').forEach(function(el){ el.placeholder = t(el.getAttribute('data-tph')); });
}
// ── ÇEVİRİ SİSTEMİ SONU ────────────────────────────────────────────────

function init() {
  try { oturum = JSON.parse(localStorage.getItem('_oturum')); } catch(e){}
  if (!oturum) { window.location.href = 'giris.html'; return; }
  DIL = oturum.dil || 'tr';
  uygulaCeviri();

  if (oturum.rol === 'Bayi' || oturum.rol === 'Admin') {
    document.getElementById('musteriKart').style.display = 'block';
    musteriYukle();
    // Bayi kendine sipariş verebilir
    if (oturum.rol === 'Bayi') {
      document.getElementById('bayiKendiSecim').style.display = 'block';
    }
  } else {
    // Müşteri: kendi adresleri
    adresYukle(oturum.id);
  }

  urunYukle();
}

function post(ep, data) {
  return fetch(API + '/' + ep, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({kullaniciId: oturum.id, rol: oturum.rol, bayiId: oturum.id}, data))
  }).then(function(r){ return r.json(); });
}

// ── MÜŞTERİ ──────────────────────────────────────────────────────────────
function musteriYukle() {
  post('getMusteriler', {}).then(function(r) {
    var sel = document.getElementById('selMusteri');
    (r.musteriler || []).forEach(function(m) {
      var opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.ad;
      sel.appendChild(opt);
    });
  });
}

function kendiSiparisToggle() {
  var chk = document.getElementById('chkKendiSiparis');
  var grup = document.getElementById('musteriSecGrup');
  if (chk.checked) {
    grup.style.display = 'none';
    adresYukle(oturum.id);
  } else {
    grup.style.display = 'block';
    var selM = document.getElementById('selMusteri');
    if (selM.value) adresYukle(selM.value);
    else resetAdresler();
  }
}

function musteriDegisti() {
  var musteriId = document.getElementById('selMusteri').value;
  if (musteriId) adresYukle(musteriId);
  else resetAdresler();
}

// ── ADRES ─────────────────────────────────────────────────────────────────
function adresYukle(musteriId) {
  var sel = document.getElementById('selAdres');
  sel.innerHTML = '<option value="">'+t('yukleniyor')+'</option>';
  post('getAdresler', { musteriId: musteriId }).then(function(r) {
    var adresler = r.adresler || [];
    sel.innerHTML = '<option value="">'+t('opt_adres_secin_zorunlu')+'</option>';
    adresler.forEach(function(a) {
      var opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.ad + (a.sehir ? ' — ' + a.sehir : '') + (a.adres ? ': ' + a.adres.substring(0, 40) : '');
      sel.appendChild(opt);
    });
    if (!adresler.length) {
      sel.innerHTML = '<option value="">'+t('msg_kayitli_adres_yok')+'</option>';
    }
  }).catch(function() {
    sel.innerHTML = '<option value="">'+t('msg_adres_yuklenemedi')+'</option>';
  });
}

function resetAdresler() {
  document.getElementById('selAdres').innerHTML = '<option value="">'+t('opt_adres_secin_zorunlu')+'</option>';
}

// ── ÜRÜN ──────────────────────────────────────────────────────────────────
function urunYukle() {
  post('getUrunListesi', {}).then(function(r) {
    tumUrunler = r.liste || [];
    document.getElementById('yukleniyor').style.display = 'none';
    if (!tumUrunler.length) {
      document.getElementById('yukleniyor').style.display = 'block';
      document.getElementById('yukleniyor').textContent = t('msg_kayitli_urun_yok');
      return;
    }
    document.getElementById('formIcerik').style.display = 'block';
    doldurMarkalar();
    doldurUrunler();
  }).catch(function() {
    document.getElementById('yukleniyor').textContent = t('msg_urunler_yuklenemedi');
  });
}

function doldurMarkalar() {
  var markalar = [];
  tumUrunler.forEach(function(u){ if (u.marka && markalar.indexOf(u.marka) < 0) markalar.push(u.marka); });
  markalar.sort();
  var sel = document.getElementById('selMarka');
  sel.innerHTML = '<option value="">'+t('opt_tumu')+'</option>';
  markalar.forEach(function(m) {
    var opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

function markaFiltre() {
  var marka = document.getElementById('selMarka').value;
  var katSel = document.getElementById('selKat');
  var secilenKat = katSel.value;
  var katlar = [];
  tumUrunler.filter(function(u){ return !marka || u.marka === marka; })
    .forEach(function(u){ if (u.kategori && katlar.indexOf(u.kategori) < 0) katlar.push(u.kategori); });
  katlar.sort();
  katSel.innerHTML = '<option value="">'+t('opt_tumu')+'</option>';
  katlar.forEach(function(k) {
    var opt = document.createElement('option');
    opt.value = k; opt.textContent = k;
    if (k === secilenKat) opt.selected = true;
    katSel.appendChild(opt);
  });
  doldurUrunler();
}

function katFiltre() { doldurUrunler(); }

function doldurUrunler() {
  var marka = document.getElementById('selMarka').value;
  var kat = document.getElementById('selKat').value;
  var filtered = tumUrunler.filter(function(u) {
    return (!marka || u.marka === marka) && (!kat || u.kategori === kat);
  });
  var sel = document.getElementById('selUrun');
  sel.innerHTML = '<option value="">'+t('opt_urun_secin')+'</option>';
  filtered.forEach(function(u) {
    var opt = document.createElement('option');
    opt.value = u.id || u.ad;
    opt.textContent = u.ad + (u.ambalaj ? ' (' + u.ambalaj + ')' : '');
    opt.dataset.urun = JSON.stringify(u);
    sel.appendChild(opt);
  });
  urunSec();
}

function urunSec() {
  var sel = document.getElementById('selUrun');
  var opt = sel.options[sel.selectedIndex];
  var bilgiDiv = document.getElementById('urunBilgi');

  if (!opt || !opt.dataset.urun) {
    bilgiDiv.style.display = 'none';
    birimFiyatDeger = 0;
    document.getElementById('birimFiyat').textContent = '—';
    document.getElementById('toplamTutar').textContent = '—';
    document.getElementById('btnSepeteEkle').disabled = true;
    return;
  }

  var u = JSON.parse(opt.dataset.urun);
  birimFiyatDeger = parseFloat(u.fiyat_admin || u.fiyat_bayi || u.fiyat || 0);
  secilenParaStr = u.para_admin || u.para_bayi || u.para || oturum.para || 'TL';

  document.getElementById('para').value = secilenParaStr;
  document.getElementById('paraBirim').textContent = secilenParaStr;
  document.getElementById('birimFiyat').textContent = birimFiyatDeger > 0 ? fmtTutar(birimFiyatDeger) : '—';

  var bilgiHTML = '📦 ' + (u.marka||'') + (u.kategori ? ' › ' + u.kategori : '')
    + (u.birim ? ' · ' + u.birim : '')
    + (u.ambalaj ? ' · ' + u.ambalaj : '');
  if (u.aktif_madde || u.aktifMadde) {
    bilgiHTML += '<br><span style="font-size:11px;color:#5f6368">💊 ' + (u.aktif_madde || u.aktifMadde) + '</span>';
  }
  bilgiDiv.innerHTML = bilgiHTML;
  bilgiDiv.style.display = 'block';

  toplamHesapla();
}

function toplamHesapla() {
  var miktar = parseInt(document.getElementById('miktar').value) || 0;
  var toplam = birimFiyatDeger * miktar;
  document.getElementById('toplamTutar').textContent = toplam > 0 ? fmtTutar(toplam) : '—';
  var urunSecildi = document.getElementById('selUrun').value !== '';
  document.getElementById('btnSepeteEkle').disabled = !(urunSecildi && miktar > 0 && birimFiyatDeger > 0);
}

// ── SEPET ─────────────────────────────────────────────────────────────────
function sepeteEkle() {
  var sel = document.getElementById('selUrun');
  var opt = sel.options[sel.selectedIndex];
  if (!opt || !opt.dataset.urun) return;
  var u = JSON.parse(opt.dataset.urun);
  var miktar = parseInt(document.getElementById('miktar').value) || 0;
  if (!miktar || !birimFiyatDeger) return;

  // Aynı ürün zaten sepette mi?
  var mevcutIdx = -1;
  for (var i = 0; i < sepet.length; i++) {
    if (sepet[i].urunId === (u.id || u.ad)) { mevcutIdx = i; break; }
  }
  var satir = {
    urunId: u.id || u.ad,
    urunAdi: u.ad,
    marka: u.marka || '',
    markaId: u.marka_id || '',
    kategori: u.kategori || '',
    katId: u.kat_id || '',
    aktifMadde: u.aktif_madde || u.aktifMadde || '',
    birim: u.birim || '',
    ambalaj: u.ambalaj || '',
    miktar: miktar,
    birimFiyat: birimFiyatDeger,
    para: secilenParaStr,
    toplam: birimFiyatDeger * miktar
  };
  if (mevcutIdx >= 0) sepet[mevcutIdx] = satir;
  else sepet.push(satir);

  // Formu temizle
  document.getElementById('selUrun').value = '';
  document.getElementById('miktar').value = '';
  document.getElementById('urunBilgi').style.display = 'none';
  document.getElementById('birimFiyat').textContent = '—';
  document.getElementById('toplamTutar').textContent = '—';
  document.getElementById('btnSepeteEkle').disabled = true;
  birimFiyatDeger = 0;

  sepetRender();
}

function sepetSil(idx) {
  sepet.splice(idx, 1);
  sepetRender();
}

function sepetRender() {
  var el = document.getElementById('sepetIcerik');
  if (!sepet.length) {
    el.innerHTML = '<p class="sepet-bos">'+t('sepet_bos')+'</p>';
    document.getElementById('btnGonder').disabled = true;
    return;
  }
  var toplamToplam = 0;
  var h = '<table class="sepet-tablo"><tr><th>'+t('th_urun')+'</th><th>'+t('th_adet')+'</th><th>'+t('th_birim_fiyat')+'</th><th>'+t('th_tutar')+'</th><th></th></tr>';
  sepet.forEach(function(s, i) {
    toplamToplam += s.toplam;
    h += '<tr>';
    h += '<td><strong>' + s.urunAdi + '</strong>';
    if (s.aktifMadde) h += '<br><span style="font-size:10px;color:#5f6368">💊 ' + s.aktifMadde + '</span>';
    h += '</td>';
    h += '<td>' + s.miktar + (s.birim ? ' ' + s.birim : '') + '</td>';
    h += '<td>' + fmtTutar(s.birimFiyat) + ' ' + s.para + '</td>';
    h += '<td><strong>' + fmtTutar(s.toplam) + ' ' + s.para + '</strong></td>';
    h += '<td><button class="sil-btn" onclick="sepetSil(' + i + ')">✕</button></td>';
    h += '</tr>';
  });
  h += '</table>';
  h += '<div class="sepet-ozet"><span>' + sepet.length + t('lbl_urun_cesidi') + '</span><span class="toplam-txt">' + t('lbl_toplam_yaklasik') + fmtTutar(toplamToplam) + '</span></div>';
  el.innerHTML = h;
  document.getElementById('btnGonder').disabled = false;
}

// ── SİPARİŞ GÖNDER ───────────────────────────────────────────────────────
function siparisGonder() {
  if (!sepet.length) { showMesaj(t('msg_sepete_urun_ekle'), false); return; }

  var adresId = document.getElementById('selAdres').value;
  if (!adresId) { showMesaj(t('msg_teslimat_secin'), false); return; }

  var musteriId;
  if (oturum.rol === 'Musteri') {
    musteriId = oturum.id;
  } else if (oturum.rol === 'Bayi' && document.getElementById('chkKendiSiparis').checked) {
    musteriId = oturum.id;
  } else {
    musteriId = document.getElementById('selMusteri').value;
    if (!musteriId) { showMesaj(t('msg_musteri_secin'), false); return; }
  }

  // Müşteri kendi bayisine, Bayi kendi ID'sine, Admin sabit koda bağlanır
  var bayiKod = oturum.rol === 'Bayi' ? oturum.id
              : oturum.rol === 'Admin' ? 'ADMIN'
              : (oturum.bayi_id || null);

  var sipNot = document.getElementById('sipNot').value;
  var btn = document.getElementById('btnGonder');
  btn.disabled = true;
  btn.textContent = t('btn_gonderiliyor');

  // Tek API çağrısıyla tüm sepeti gönder
  fetch(API + '/siparisVer', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      musteriId: musteriId,
      bayiKod: bayiKod,
      adresId: adresId,
      sipNot: sipNot,
      rol: oturum.rol,
      urunler: sepet.map(function(s) {
        return { urunId: s.urunId, urunAdi: s.urunAdi, marka: s.marka, markaId: s.markaId,
                 kategori: s.kategori, katId: s.katId, miktar: s.miktar,
                 birimFiyat: s.birimFiyat, para: s.para, toplam: s.toplam };
      })
    })
  }).then(function(r){ return r.json(); }).then(function(r) {
    if (r.basarili) {
      showMesaj(t('msg_sip_alindi') + r.siparisId, true);
      sepet = [];
      sepetRender();
      document.getElementById('sipNot').value = '';
      btn.textContent = t('btn_sip_gonder');
    } else {
      showMesaj('❌ ' + (r.hata||t('msg_hata_olustu')), false);
      btn.disabled = false;
      btn.textContent = t('btn_sip_gonder');
    }
  }).catch(function() {
    showMesaj(t('msg_baglanti_hatasi'), false);
    btn.disabled = false;
    btn.textContent = t('btn_sip_gonder');
  });
}

// ── ADRES EKLE MODAL ──────────────────────────────────────────────────────
function aktifMusteriId() {
  if (oturum.rol === 'Musteri') return oturum.id;
  if (oturum.rol === 'Bayi' && document.getElementById('chkKendiSiparis').checked) return oturum.id;
  return document.getElementById('selMusteri').value || null;
}

function adresEkleAc() {
  var mid = aktifMusteriId();
  if (!mid) { showMesaj(t('msg_once_musteri_secin'), false); return; }
  ['yeniAdresAd','yeniAdresAlici','yeniAdresTel','yeniAdresSehir','yeniAdresIlce','yeniAdresSatir'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('adresMesaj').style.display = 'none';
  document.getElementById('btnAdresKaydet').disabled = false;
  document.getElementById('adresModal').classList.add('acik');
  document.getElementById('yeniAdresAd').focus();
}

function adresEkleKapat() {
  document.getElementById('adresModal').classList.remove('acik');
}

function adresEkleKaydet() {
  var ad = document.getElementById('yeniAdresAd').value.trim();
  var adresSatir = document.getElementById('yeniAdresSatir').value.trim();
  var adSoyad = document.getElementById('yeniAdresAlici').value.trim();
  var tel = document.getElementById('yeniAdresTel').value.trim();
  var sehir = document.getElementById('yeniAdresSehir').value.trim();
  var ilce = document.getElementById('yeniAdresIlce').value.trim();
  if (!ad || !adresSatir) {
    var el = document.getElementById('adresMesaj');
    el.textContent = t('msg_adres_adi_zorunlu');
    el.className = 'mesaj hata';
    el.style.display = 'block';
    return;
  }
  var mid = aktifMusteriId();
  var btn = document.getElementById('btnAdresKaydet');
  btn.disabled = true;
  btn.textContent = t('btn_kaydediliyor');

  fetch(API + '/adresKaydet', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ musteriId: mid, ad: ad, adres: adresSatir, sehir: sehir, adSoyad: adSoyad, tel: tel, ilce: ilce })
  }).then(function(r){ return r.json(); }).then(function(r) {
    if (r.basarili) {
      var yeniId = r.id;
      adresEkleKapat();
      // Listeyi yenile ve yeni adresi otomatik seç
      adresYukleVeSeç(mid, yeniId);
    } else {
      var el = document.getElementById('adresMesaj');
      el.textContent = r.hata || t('msg_kayit_hatasi');
      el.className = 'mesaj hata';
      el.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t('kaydet');
    }
  }).catch(function() {
    var el = document.getElementById('adresMesaj');
    el.textContent = t('msg_baglanti_hatasi');
    el.className = 'mesaj hata';
    el.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t('kaydet');
  });
}

function adresYukleVeSeç(musteriId, seçilecekId) {
  var sel = document.getElementById('selAdres');
  sel.innerHTML = '<option value="">'+t('yukleniyor')+'</option>';
  post('getAdresler', { musteriId: musteriId }).then(function(r) {
    var adresler = r.adresler || [];
    sel.innerHTML = '<option value="">'+t('opt_adres_secin_zorunlu')+'</option>';
    adresler.forEach(function(a) {
      var opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.ad + (a.sehir ? ' — ' + a.sehir : '') + (a.adres ? ': ' + a.adres.substring(0, 40) : '');
      if (a.id === seçilecekId) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!adresler.length) sel.innerHTML = '<option value="">'+t('msg_kayitli_adres_yok')+'</option>';
  });
}

function showMesaj(m, ok) {
  var el = document.getElementById('mesaj');
  el.textContent = m;
  el.className = 'mesaj ' + (ok ? 'basarili' : 'hata');
  el.style.display = 'block';
  if (ok) setTimeout(function(){ el.style.display='none'; }, 5000);
}

window.onload = init;
</script>
</body></html>
