<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Giriş</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.kart{background:#fff;border-radius:16px;padding:36px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
h2{text-align:center;color:#1a1a2e;margin-bottom:24px;font-size:20px}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:#5f6368;margin-bottom:4px}
input{width:100%;padding:10px;border:1px solid #dadce0;border-radius:8px;font-size:14px}
.btn{width:100%;padding:11px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{background:#1557b0}
.hata{background:#fce8e6;color:#d93025;padding:10px;border-radius:8px;font-size:12px;margin-top:12px;display:none}
</style></head><body>
<div class="kart">
  <h2>🏢 Giriş Yap</h2>
  <div class="form-group"><label>E-posta</label><input id="email" type="email" placeholder="email@örnek.com"></div>
  <div class="form-group"><label>Şifre</label><input id="sifre" type="password" placeholder="••••••"></div>
  <button class="btn" onclick="giris()">Giriş Yap</button>
  <div class="hata" id="hata"></div>
</div>
<script>
const API = '/api';
async function giris() {
  var email = document.getElementById('email').value.trim();
  var sifre = document.getElementById('sifre').value;
  if (!email || !sifre) { showHata('Email ve şifre girin'); return; }
  try {
    var r = await fetch(API + '/girisYap', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, sifre})
    }).then(x => x.json());
    if (r.basarili && r.kullanici) {
      localStorage.setItem('_oturum', JSON.stringify(r.kullanici));
      window.location.href = 'dashboard.html';
    } else {
      showHata(r.hata || 'Giriş başarısız');
    }
  } catch(e) { showHata('Bağlantı hatası'); }
}
function showHata(m) {
  var el = document.getElementById('hata');
  el.textContent = m; el.style.display = 'block';
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') giris(); });
</script>
</body></html>
